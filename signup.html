<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Sign Up</h1>
  <form onsubmit="return checkEmail()">
  <div class="container">
  <p>Please fill in this form to create an account.</p>

  <label for="uname">User name:</label><br>
  <input type="text" placeholder="James" id="uname" name="uname" required> <br>
  <label for="email">Email:</label><br>
  <input type="text" placeholder="James@gmail.com" id="email" name="email" required> <br>
  <label for="psw">Password:</label> <br>
  <input type="password" id="psw" name="psw" required> <br>
  
   <p>By creating an account you agree to our <a href="#" style="color:dodgerblue">Terms & Privacy</a>.</p>
 
   <div class="clearfix">    
      <button type="submit" class="signupbtn">Sign Up</button>
      <a href="index.html">
      <button type="button" class="cancelbtn">Cancel</button>
      </a>
    </div>
    </div>
</form>

<script>
function checkEmail() {
    let email = document.getElementById("email").value;

    if (email.includes("@") && email.includes(".")) {
        alert("Valid email!");
        return true;
    } else {
        alert("Invalid email!");
        return false;
    }
}
</script>

</body>
</html>

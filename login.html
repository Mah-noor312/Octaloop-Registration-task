<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Login</h1>
<form>
<div class="container">
  <p>Please login to proceed.</p>
  <label for="email">Email:</label><br>
  <input type="text" placeholder="James@gmail.com" id="email" name="email" required> <br>
  <label for="psw">Password:</label> <br>
  <input type="password" id="psw" name="psw" required style="margin-bottom:15px;"> <br>

   <div class="clearfix">    
      <button type="submit" class="signupbtn">Login</button>
     <a href="index.html">
         <button type="button" class="cancelbtn">Cancel </button>
     </a>
    </div>
    </div>
</form>

</body>
</html>
